<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Hit Banner 生成ツール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-3xl font-bold mb-8 text-center">🐎 Hit Banner HTML生成</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="space-y-6">
        <div>
          <label class="block text-sm mb-1 font-medium">提供ランク</label>
          <select id="rank" onchange="updateRankInfo()" class="w-full border p-3 rounded-lg">
            <option value="限定勝負">限定勝負</option>
            <option value="プレミアム勝負">プレミアム勝負</option>
            <option value="Bランク">Bランク</option>
            <option value="Cランク" selected>Cランク</option>
            <option value="厳選提供">厳選提供</option>
            <option value="重賞メイン">重賞メイン</option>
            <option value="境軍団">境軍団【SAKURA】</option>
            <option value="西の馬券師">西の馬券師集団</option>
            <option value="チームスタリオン">チームスタリオン</option>
            <option value="ジョッキー特捜班">ジョッキー情報特捜班</option>
          </select>
        </div>

        <div>
          <label class="block text-sm mb-1 font-medium">ot_kenshu 文言（自動入力）</label>
          <input id="kenshu" class="w-full border p-3 rounded-lg">
        </div>

        <div>
          <label class="block text-sm mb-1 font-medium">サムネイルURL（自動入力）</label>
          <input id="thumb" readonly class="w-full border p-3 rounded-lg bg-gray-50">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1 font-medium">タイトル1行目（赤字）</label>
            <input id="title1" value="前走は敗因明確で度外視！" class="w-full border p-3 rounded-lg">
          </div>
          <div>
            <label class="block text-sm mb-1 font-medium">タイトル2行目</label>
            <input id="title2" value="滞在での一変を見抜き◎○▲で314倍！" class="w-full border p-3 rounded-lg">
          </div>
        </div>

        <div>
          <label class="block text-sm mb-1 font-medium">レース情報 (ot_date)</label>
          <input id="date" value="6月21日(日) 阪神12R" class="w-full border p-3 rounded-lg">
        </div>

        <!-- 印 -->
        <div>
          <label class="block text-sm mb-2 font-medium">印 + 馬名 + 人気</label>
          <div class="space-y-3">
            <div class="flex gap-3 items-center">
              <span class="w-12 font-bold text-red-600">◎</span>
              <input id="horse1" value="タガノアバンドーネ" class="flex-1 border p-3 rounded-lg">
              <input id="pop1" placeholder="人気" class="w-20 border p-3 rounded-lg">
            </div>
            <div class="flex gap-3 items-center">
              <select id="mark2" class="w-20 border p-2 rounded">
                <option value="○">○</option>
                <option value="▲">▲</option>
                <option value="△">△</option>
              </select>
              <input id="horse2" value="ソウルアンドジャズ" class="flex-1 border p-3 rounded-lg">
              <input id="pop2" value="5" placeholder="人気" class="w-20 border p-3 rounded-lg">
            </div>
            <div class="flex gap-3 items-center">
              <select id="mark3" class="w-20 border p-2 rounded">
                <option value="▲">▲</option>
                <option value="△">△</option>
                <option value="○">○</option>
              </select>
              <input id="horse3" value="クロノスバレット" class="flex-1 border p-3 rounded-lg">
              <input id="pop3" placeholder="人気" class="w-20 border p-3 rounded-lg">
            </div>
          </div>
        </div>

        <!-- 金額 -->
        <div>
          <label class="block text-sm mb-2 font-medium">的中金額（万＋円）</label>
          <div class="space-y-3">
            <div class="flex items-center gap-2">
              <span class="w-16">3連単</span>
              <input id="sanrentan_man" value="3" class="w-16 border p-3 rounded-lg text-center"> 万
              <input id="sanrentan_en" value="1420" class="flex-1 border p-3 rounded-lg"> 円
            </div>
            <div class="flex items-center gap-2">
              <span class="w-16">3連複</span>
              <input id="sanrenpuku_man" value="" class="w-16 border p-3 rounded-lg text-center"> 万
              <input id="sanrenpuku_en" value="4510" class="flex-1 border p-3 rounded-lg"> 円
            </div>
            <div class="flex items-center gap-2">
              <span class="w-16">馬連</span>
              <input id="umaren_man" value="" class="w-16 border p-3 rounded-lg text-center"> 万
              <input id="umaren_en" value="4110" class="flex-1 border p-3 rounded-lg"> 円
            </div>
          </div>
        </div>
      </div>

      <!-- 生成結果 -->
      <div>
        <button onclick="generateHTML()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-medium mb-6">
          HTML生成
        </button>
        <pre id="output" class="bg-gray-900 text-green-300 p-5 rounded-xl text-sm h-96 overflow-auto font-mono"></pre>
        <button onclick="copyToClipboard()" class="mt-4 w-full bg-gray-800 hover:bg-gray-900 text-white py-3 rounded-xl">
          📋 クリップボードにコピー
        </button>
      </div>
    </div>
  </div>

  <script>
    const thumbnailMap = {
      "限定勝負": "https://www-f.t-tank.net/img/pics/thumbnail/gentei.jpg",
      "プレミアム勝負": "https://www-f.t-tank.net/img/pics/thumbnail/premium.jpg",
      "Bランク": "https://www-f.t-tank.net/img/pics/thumbnail/gensen.jpg",
      "Cランク": "https://www-f.t-tank.net/img/pics/thumbnail/C.jpg",
      "厳選提供": "https://www-f.t-tank.net/img/pics/thumbnail/gensen.jpg",
      "重賞メイン": "https://www-f.t-tank.net/img/pics/thumbnail/jusyo.jpg",
      "境軍団": "https://www-f.t-tank.net/img/thumb/uraneta/tit_uraneta_05.jpg",
      "西の馬券師": "https://www-f.t-tank.net/img/thumb/uraneta/tit_uraneta_04.jpg",
      "チームスタリオン": "https://www-f.t-tank.net/img/pics/thumbnail/tit_uraneta_11.jpg",
      "ジョッキー特捜班": "https://www-f.t-tank.net/img/pics/thumbnail/tit_uraneta_14.jpg"
    };

    const kenshuMap = {
      "限定勝負": "限定勝負レース",
      "プレミアム勝負": "プレミアム勝負レース",
      "Bランク": "推薦勝負レースB",
      "Cランク": "推薦勝負レースC",
      "厳選提供": "特注馬出走レースD",
      "重賞メイン": "重賞メイン",
      "境軍団": "境軍団【SAKURA】",
      "西の馬券師": "西の馬券師集団",
      "チームスタリオン": "チームスタリオン",
      "ジョッキー特捜班": "ジョッキー情報特捜班"
    };

    function updateRankInfo() {
      const rank = document.getElementById('rank').value;
      document.getElementById('thumb').value = thumbnailMap[rank] || "";
      document.getElementById('kenshu').value = kenshuMap[rank] || rank;
    }

    function generateHTML() {
      const thumb = document.getElementById('thumb').value;
      const kenshu = document.getElementById('kenshu').value;
      const date = document.getElementById('date').value;
      const title1 = document.getElementById('title1').value;
      const title2 = document.getElementById('title2').value;

      const horse1 = document.getElementById('horse1').value;
      const pop1 = document.getElementById('pop1').value ? `(${document.getElementById('pop1').value}番人気)` : "";
      const mark2 = document.getElementById('mark2').value;
      const horse2 = document.getElementById('horse2').value;
      const pop2 = document.getElementById('pop2').value ? `(${document.getElementById('pop2').value}番人気)` : "";
      const mark3 = document.getElementById('mark3').value;
      const horse3 = document.getElementById('horse3').value;
      const pop3 = document.getElementById('pop3').value ? `(${document.getElementById('pop3').value}番人気)` : "";

      const sMan = document.getElementById('sanrentan_man').value;
      const sEn = document.getElementById('sanrentan_en').value;
      const spMan = document.getElementById('sanrenpuku_man').value;
      const spEn = document.getElementById('sanrenpuku_en').value;
      const uMan = document.getElementById('umaren_man').value;
      const uEn = document.getElementById('umaren_en').value;

      const sanrentan = (sMan ? sMan + "万" : "") + sEn;
      const sanrenpuku = (spMan ? spMan + "万" : "") + spEn;
      const umaren = (uMan ? uMan + "万" : "") + uEn;

      const html = `<div class="tekicyuBox">
<a href="/members/hit/record.html?cid=103968#teki03">
<div class="tekicyuImg">
<img src="${thumb}" alt=""></div>
<div class="tekicyuBottom">
<p class="ot_ti_text">
<span style="color:#FF0000">${title1}</span><br />
${title2}
</p>
<br />
<p class="ot_kenshu">${kenshu}</p>
<p class="ot_date">${date}</p>
<p class="ot_chakujun">
<span style="color:#FF0000"><b>◎${horse1}</b></span>${pop1}<br>
<b>${mark2}${horse2}${pop2}</b><br>
<b>${mark3}${horse3}${pop3}</b>
</p>
<p class="ot_haito">
<span>3連単</span><strong>${sanrentan}円</strong>的中<br>
<span>3連複</span><strong>${sanrenpuku}円</strong>的中<br>
<span>馬連</span><strong>${umaren}円</strong>的中
</p>
</div>
</a>
</div>`;

      document.getElementById('output').textContent = html;
    }

    function copyToClipboard() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text).then(() => alert('✅ コピーしました！'));
    }

    window.onload = () => {
      updateRankInfo();
      generateHTML();
    };
  </script>
</body>
</html>
