<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>的中バナー&ページ 生成ツール</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    pre { white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
  </style>
</head>
<body class="bg-gray-100 p-6">
<!-- タイトル + ログアウトボタン（レスポンシブ対応） -->
<div class="flex justify-between items-center mb-8 px-2">
  <div class="flex items-center gap-3">
    <span class="text-4xl">🎯</span>
    <h1 class="text-3xl font-bold">的中バナー&ページ 生成ツール</h1>
  </div>
  
  <button onclick="logout()" 
          class="text-red-600 hover:text-red-700 font-medium flex items-center gap-1 px-4 py-2 rounded-lg hover:bg-red-50 transition whitespace-nowrap">
    ← ログアウト
  </button>
</div>

<script>
function logout() {
  if (confirm("ログアウトしますか？")) {
    window.location.href = "login.html";
  }
}
</script>
  <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-3xl font-bold mb-8 text-center">🎯 的中バナー&ページ 生成ツール</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- 入力 -->
      <div class="space-y-6">
        <div>
          <label class="block text-sm mb-1 font-medium">的中ページ_リンク (cid)</label>
          <input id="cid" value="104137" class="w-full border p-3 rounded-lg">
        </div>

        <div>
          <label class="block text-sm mb-1 font-medium">提供ランク</label>
          <select id="rank" onchange="updateRankInfo()" class="w-full border p-3 rounded-lg">
            <option value="プレミアム勝負" selected>プレミアム勝負</option>
            <option value="限定勝負">限定勝負</option>
            <option value="Bランク">Bランク</option>
            <option value="Cランク">Cランク</option>
            <option value="厳選提供">厳選提供</option>
            <option value="重賞メイン">重賞メイン</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm mb-1">ot_kenshu（自動）</label>
            <input id="kenshu" readonly class="w-full border p-3 rounded-lg bg-gray-50">
          </div>
          <div>
            <label class="block text-sm mb-1">サムネイル（自動）</label>
            <input id="thumb" readonly class="w-full border p-3 rounded-lg bg-gray-50 text-xs">
          </div>
        </div>

        <div class="grid grid-cols-5 gap-3">
          <div>
            <label class="block text-sm mb-1">月</label>
            <input id="month" value="6" class="w-full border p-3 rounded-lg text-center">
          </div>
          <div>
            <label class="block text-sm mb-1">日</label>
            <input id="day" value="28" class="w-full border p-3 rounded-lg text-center">
          </div>
          <div>
            <label class="block text-sm mb-1">曜日</label>
            <select id="weekday" class="w-full border p-3 rounded-lg">
              <option value="土" selected>土</option>
              <option value="日">日</option>
              <option value="月">月</option>
            </select>
          </div>
          <div>
            <label class="block text-sm mb-1">競馬場</label>
            <select id="place" class="w-full border p-3 rounded-lg">
              <option value="札幌" selected>札幌</option>
              <option value="函館">函館</option>
              <option value="福島">福島</option>
              <option value="新潟">新潟</option>
              <option value="東京">東京</option>
              <option value="中山">中山</option>
              <option value="中京">中京</option>
              <option value="京都">京都</option>
              <option value="阪神">阪神</option>
              <option value="小倉">小倉</option>
            </select>
          </div>
          <div>
            <label class="block text-sm mb-1">R</label>
            <select id="raceNo" class="w-full border p-3 rounded-lg">
              <option value="1">1</option><option value="2">2</option><option value="3">3</option>
              <option value="4">4</option><option value="5">5</option><option value="6">6</option>
              <option value="7">7</option><option value="8">8</option><option value="9" selected>9</option>
              <option value="10">10</option><option value="11">11</option><option value="12">12</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-sm mb-1">レース名</label>
          <input id="raceName" value="" class="w-full border p-3 rounded-lg" placeholder="例: 臥牛山特別">
        </div>

        <div class="grid grid-cols-1 gap-4">
          <div>
            <label class="block text-sm mb-1">タイトル1行目</label>
            <input id="title1" class="w-full border p-3 rounded-lg">
          </div>
          <div>
            <label class="block text-sm mb-1">タイトル2行目</label>
            <input id="title2" class="w-full border p-3 rounded-lg">
          </div>
        </div>

        <div>
          <label class="block text-sm mb-2">印 + 馬名 + 人気</label>
          <div class="space-y-3">
            <div class="flex gap-3 items-center">
              <span class="w-12 font-bold text-red-600">◎</span>
              <input id="horse1" class="flex-1 border p-3 rounded-lg" placeholder="馬名">
              <input id="pop1" class="w-20 border p-3 rounded-lg" placeholder="人気">
            </div>
            <div class="flex gap-3 items-center">
              <select id="mark2" class="w-20 border p-2 rounded">
                <option value="○">○</option>
                <option value="▲" selected>▲</option>
                <option value="△">△</option>
              </select>
              <input id="horse2" class="flex-1 border p-3 rounded-lg" placeholder="馬名">
              <input id="pop2" class="w-20 border p-3 rounded-lg" placeholder="人気">
            </div>
            <div class="flex gap-3 items-center">
              <select id="mark3" class="w-20 border p-2 rounded">
                <option value="○" selected>○</option>
                <option value="▲">▲</option>
                <option value="△">△</option>
              </select>
              <input id="horse3" class="flex-1 border p-3 rounded-lg" placeholder="馬名">
              <input id="pop3" class="w-20 border p-3 rounded-lg" placeholder="人気">
            </div>
          </div>
        </div>

        <div>
          <label class="block text-sm mb-3">的中金額（万＋円）</label>
          <div class="space-y-4">
            <div class="flex items-center gap-3">
              <span class="w-20">3連単</span>
              <input id="sanrentan_man" class="w-16 border p-3 rounded text-center">
              <span>万</span>
              <input id="sanrentan_en" class="flex-1 border p-3 rounded">
              <span>円</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="w-20">3連複</span>
              <input id="sanrenpuku_man" class="w-16 border p-3 rounded text-center">
              <span>万</span>
              <input id="sanrenpuku_en" class="flex-1 border p-3 rounded">
              <span>円</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="w-20">馬連</span>
              <input id="umaren_point" class="w-12 border p-3 rounded text-center" placeholder="">
              <span>点目</span>
              <input id="umaren_man" class="w-16 border p-3 rounded text-center">
              <span>万</span>
              <input id="umaren_en" class="flex-1 border p-3 rounded">
              <span>円</span>
              <input id="umaren_pct" class="w-16 border p-3 rounded text-center" placeholder="％">％指定
            </div>
          </div>
        </div>

        <div>
          <label class="block text-sm mb-1">推奨文タグをここに貼り付け...</label>
          <textarea id="bodyText" rows="6" class="w-full border p-4 rounded-lg"></textarea>
        </div>
      </div>

      <!-- 出力 -->
      <div>
        <button onclick="generateBoth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-medium mb-6">
          🔄 的中バナー&ページ 生成
        </button>

        <div class="mb-6">
          <h3 class="font-bold mb-2">的中バナー</h3>
          <pre id="bannerOutput" class="bg-gray-900 text-green-300 p-5 rounded-xl text-sm h-64 overflow-auto"></pre>
          <button onclick="copyText('bannerOutput')" class="mt-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm">コピー</button>
        </div>

        <div>
          <h3 class="font-bold mb-2">的中ページ</h3>
          <pre id="pageOutput" class="bg-gray-900 text-green-300 p-5 rounded-xl text-sm h-64 overflow-auto"></pre>
          <button onclick="copyText('pageOutput')" class="mt-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm">コピー</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const thumbnailMap = {
      "限定勝負": "https://www-f.t-tank.net/img/pics/thumbnail/gentei.jpg",
      "プレミアム勝負": "https://www-f.t-tank.net/img/pics/thumbnail/premium.jpg",
      "Bランク": "https://www-f.t-tank.net/img/pics/thumbnail/gensen.jpg",
      "Cランク": "https://www-f.t-tank.net/img/pics/thumbnail/C.jpg",
      "厳選提供": "https://www-f.t-tank.net/img/pics/thumbnail/gensen.jpg",
      "重賞メイン": "https://www-f.t-tank.net/img/pics/thumbnail/jusyo.jpg"
    };

    const kenshuMap = {
      "限定勝負": "限定勝負レース",
      "プレミアム勝負": "プレミアム勝負レース",
      "Bランク": "推薦勝負レースB",
      "Cランク": "推薦勝負レースC",
      "厳選提供": "特注馬出走レースD",
      "重賞メイン": ""
    };

    function updateRankInfo() {
      const rank = document.getElementById('rank').value;
      document.getElementById('thumb').value = thumbnailMap[rank] || "";
      let k = kenshuMap[rank] || rank;
      if (rank === "重賞メイン") {
        k = document.getElementById('raceName').value || "重賞メイン";
      }
      document.getElementById('kenshu').value = k;
    }

    function formatMoney(man, en) {
      if (!man && !en) return "";
      const m = man ? parseInt(man) : 0;
      const e = en ? parseInt(en) : 0;
      if (m > 0) {
        return m + "万" + String(e).padStart(4, '0') + "円";
      } else {
        return e + "円";
      }
    }

    function generateBoth() {
      const rank = document.getElementById('rank').value;
      const thumb = document.getElementById('thumb').value;
      let kenshu = document.getElementById('kenshu').value;
      const raceName = document.getElementById('raceName').value || "レース名";
      if (rank === "重賞メイン") kenshu = raceName;

      const month = document.getElementById('month').value;
      const day = document.getElementById('day').value;
      const weekday = document.getElementById('weekday').value;
      const place = document.getElementById('place').value;
      const raceNo = document.getElementById('raceNo').value;
      const date = `${month}月${day}日(${weekday}) ${place}${raceNo}R`;

      const title1 = document.getElementById('title1').value;
      const title2 = document.getElementById('title2').value;

      const horse1 = document.getElementById('horse1').value || "";
      const horse2 = document.getElementById('horse2').value || "";
      const horse3 = document.getElementById('horse3').value || "";

      const sMan = document.getElementById('sanrentan_man').value || "";
      const sEn = document.getElementById('sanrentan_en').value || "";
      const spMan = document.getElementById('sanrenpuku_man').value || "";
      const spEn = document.getElementById('sanrenpuku_en').value || "";

      const uPoint = document.getElementById('umaren_point').value.trim();
      const uMan = document.getElementById('umaren_man').value || "";
      const uEn = document.getElementById('umaren_en').value || "";
      const uPct = document.getElementById('umaren_pct').value || "";

      let payoutHTML = "";

      if (sMan || sEn) payoutHTML += `<span>3連単</span><strong>${formatMoney(sMan, sEn)}</strong>的中<br>\n`;
      if (spMan || spEn) payoutHTML += `<span>3連複</span><strong>${formatMoney(spMan, spEn)}</strong>的中<br>\n`;
      if (uMan || uEn) {
        const pointText = uPoint ? uPoint + "点目" : "";
        const amount = formatMoney(uMan, uEn);
        payoutHTML += `<span>馬連${pointText}</span><strong>${amount}</strong>的中${uPct ? `(${uPct}％指定)` : ''}<br>\n`;
      }
      if (uPct && (uMan || uEn)) {
        const total = (parseInt(uMan || 0) * 10000) + parseInt(uEn || 0);
        const rate = Math.round(total * (parseInt(uPct) / 100));
        payoutHTML += `<span>(※割合回収率${rate}％！)</span><br>\n`;
      }

      const cid = document.getElementById('cid').value || "104137";

      const banner = `<div class="tekicyuBox">
<a href="/members/hit/record.html?cid=${cid}#teki03">
<div class="tekicyuImg"><img src="${thumb}" alt=""></div>
<div class="tekicyuBottom">
<p class="ot_ti_text"><span style="color:#FF0000">${title1}</span><br>${title2}</p>
<br>
<p class="ot_kenshu">${kenshu}</p>
<p class="ot_date">${date}</p>
<p class="ot_chakujun">
<span style="color:#FF0000"><b>◎${horse1}</b></span><br>
<b>○${horse2}</b><br>
<b>▲${horse3}</b>
</p>
<p class="ot_haito">
${payoutHTML}
</p>
</div>
</a>
</div>`;

      document.getElementById('bannerOutput').textContent = banner;

      const page = `<!--${raceName} ここから-->
<div class="tekicyuBox">
${banner}
</div>
<p class="ot_info"><strong>こんな情報でした</strong></p>
<div class="ot_box">
<p class="ot_text">${document.getElementById('bodyText').value || '解説文'}</p>
</div>
<!--ボタン-->
<div style="text-align: center">
<a href="https://www.t-tank.net/members/hit/board.html" class="ot_btn">
実際に会員様から寄せられた<br>
的中画像、歓喜の声を公開中！
</a>
</div>
<!--${raceName} ここまで-->`;

      document.getElementById('pageOutput').textContent = page;
    }

    function copyText(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => alert('コピーしました！'));
    }

    window.onload = updateRankInfo;
  </script>
</body>
</html>
