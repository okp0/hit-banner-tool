<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>⌛ 的中バナー&ページ生成</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-8">🎯 的中バナー&ページ生成</h1>
    <h2 class="text-xl text-center mb-6">ログイン</h2>
    
    <div class="space-y-4">
      <div>
        <label class="block text-sm mb-1">ログインID</label>
        <input id="id" value="thinktank" class="w-full border p-3 rounded-lg" readonly>
      </div>
      <div>
        <label class="block text-sm mb-1">パスワード</label>
        <input id="pass" type="password" class="w-full border p-3 rounded-lg">
      </div>
      <button onclick="login()" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium">
        ログイン
      </button>
    </div>
  </div>

  <script>
    function login() {
      const pass = document.getElementById('pass').value;
      if (pass === "ttank-7284") {
        // ログイン成功 → index.htmlへ
        window.location.href = "index.html";
      } else {
        alert("パスワードが違います");
      }
    }

    // Enterキーでもログインできるように
    document.getElementById('pass').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
